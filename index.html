<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Pokedex</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#" data-geracao="1">Primeira Geração</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="#" data-geracao="2">Segunda Geração</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="#" data-geracao="3">Terceira Geração</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

    <div id="carregamento" class="carregamento" style="display: none;">
        <img src="./carregamento.gif" alt="Carregando...">
    </div>

    <main id="conteudo" class="container" style="display: none;">
        <div class="row">
            <div class="col-12">
                <input 
                    type="text" 
                    id="filtro" 
                    placeholder="Qual Pokémon você está procurando?" 
                    class="form-control pesquisa"
                >
                <p id="mensagem-filtro"></p>
            </div>
        </div>
        <div id="pokemon-container" class="row"></div>
    </main>

    <script src="./main.js"></script>
</body>
</html>
